<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Red Heart</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="heart.png">
    <style>
      body {
        margin: 0;
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      canvas {
        border: 2px solid red;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" width="600" height="600"></canvas>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      function heartX(M) {
        return 15 * Math.sin(M) ** 3;
      }

      function heartY(M) {
        return 12 * Math.cos(M)
             - 5 * Math.cos(2 * M)
             - 2 * Math.cos(3 * M)
             - Math.cos(4 * M);
      }

      let M = 0;

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.strokeStyle = "red";
        ctx.lineWidth = 2;

        for (let t = 0; t < M; t += 0.01) {
          let x = heartX(t) * 18 + canvas.width / 2;
          let y = -heartY(t) * 18 + canvas.height / 2;
          ctx.lineTo(x, y);
        }

        ctx.stroke();

        M += 0.05;
        if (M < Math.PI * 2) {
          requestAnimationFrame(draw);
        } else {
          M = 0;
          requestAnimationFrame(draw);
        }
      }

      draw();
    </script>
  </body>
</html>
