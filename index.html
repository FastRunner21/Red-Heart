<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Red Heart</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/gif" href="Heart.gif">
    <style>
      body {
        margin: 0;
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
      }
      canvas {
        border: 2px solid red;
      }
      footer {
        color: red;
        font-family: Arial, sans-serif;
        font-size: 18px;
        margin-top: 10px;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.3; }
        100% { opacity: 1; }
      }
    </style>
  </head>

  <body>
    <!-- 🎵 Hudba -->
    <audio autoplay loop>
      <source src="Heart.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>

    <canvas id="canvas" width="600" height="600"></canvas>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      function heartX(M) {
        return 15 * Math.sin(M) ** 3;
      }

      function heartY(M) {
        return 12 * Math.cos(M)
             - 5 * Math.cos(2 * M)
             - 2 * Math.cos(3 * M)
             - Math.cos(4 * M);
      }

      let blink = true;

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.strokeStyle = "red";
        ctx.lineWidth = 2;

        for (let t = 0; t < Math.PI * 2; t += 0.01) {
          let x = heartX(t) * 18 + canvas.width / 2;
          let y = -heartY(t) * 18 + canvas.height / 2;
          ctx.lineTo(x, y);
        }

        ctx.stroke();

        // Blikající text uprostřed
        if (blink) {
          ctx.font = "bold 40px Arial";
          ctx.fillStyle = "red";
          ctx.textAlign = "center";
          ctx.fillText("Miluju tee ❤️", canvas.width / 2, canvas.height / 2);
        }

        blink = !blink;
        requestAnimationFrame(draw);
      }

      draw();
    </script>

    <footer>
      © <span id="year"></span> Miluju tee – Žebřík
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
